<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartoon World</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Comic Sans MS', cursive;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(#6ec6ff,#b3ecff);
position:relative;
}

/* Quyosh */
.sun{
position:absolute;
top:40px;
right:80px;
width:120px;
height:120px;
background:#FFD93D;
border-radius:50%;
box-shadow:0 0 50px #FFD93D;
animation:spin 15s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* Bulut */
.cloud{
position:absolute;
background:white;
border-radius:50px;
}

.cloud:before,
.cloud:after{
content:"";
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
top:80px;
left:-250px;
width:180px;
height:60px;
animation:moveCloud 25s linear infinite;
}

.cloud1:before{
width:70px;
height:70px;
top:-30px;
left:20px;
}

.cloud1:after{
width:90px;
height:90px;
top:-40px;
left:70px;
}

.cloud2{
top:180px;
left:-300px;
width:220px;
height:70px;
animation:moveCloud 35s linear infinite;
animation-delay:5s;
}

.cloud2:before{
width:80px;
height:80px;
top:-30px;
left:25px;
}

.cloud2:after{
width:100px;
height:100px;
top:-40px;
left:90px;
}

@keyframes moveCloud{
0%{transform:translateX(0);}
100%{transform:translateX(1800px);}
}

/* Yer */
.ground{
position:absolute;
bottom:0;
width:100%;
height:180px;
background:#4CAF50;
border-top-left-radius:100% 60px;
border-top-right-radius:100% 60px;
}

/* Uy */
.house{
position:absolute;
bottom:140px;
left:120px;
width:180px;
height:140px;
background:#FFD54F;
border-radius:10px;
}

.roof{
position:absolute;
top:-70px;
left:-20px;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:70px solid #E53935;
}

.door{
position:absolute;
bottom:0;
left:65px;
width:50px;
height:80px;
background:#795548;
border-radius:8px 8px 0 0;
}

/* Matn */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
text-shadow:3px 3px 6px rgba(0,0,0,.3);
}

.content h1{
font-size:70px;
}

.content p{
font-size:24px;
margin:20px 0;
}

button{
padding:18px 45px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4081;
color:white;
cursor:pointer;
transition:.3s;
animation:bounce 2s infinite;
}

button:hover{
background:#e91e63;
transform:scale(1.1);
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="content">
<h1>🌈 Cartoon World</h1>
<p>Rang-barang va quvnoq HTML sahifasi</p>
<button>Boshlash 🚀</button>
</div>

<div class="ground">
<div class="house">
<div class="roof"></div>
<div class="door"></div>
</div>
</div>

</body>
</html>

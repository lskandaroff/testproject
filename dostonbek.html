<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Portfoliom</title>
    <style>
        /* Umumiy stillar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #cbd5e1;
            line-height: 1.6;
        }

        /* Navigatsiya paneli */
        header {
            background-color: #1e293b;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header .logo {
            color: #38bdf8;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #38bdf8;
        }

        /* Asosiy qism (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
        }

        .hero h1 {
            font-size: 3.5rem;
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .hero h1 span {
            color: #38bdf8;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background-color: #0ea5e9;
        }

        /* Xizmatlar qismi */
        .services {
            padding: 100px 5%;
            text-align: center;
        }

        .services h2 {
            font-size: 2.5rem;
            color: #f8fafc;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
        }

        .card h3 {
            color: #f8fafc;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        /* Footer */
        footer {
            background-color: #0f172a;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #334155;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">DevPortfolio</a>
        <nav>
            <a href="#home">Asosiy</a>
            <a href="#services">Xizmatlar</a>
            <a href="#contact">Aloqa</a>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1>Salom, men <span>Anvarman</span></h1>
        <p>Men zamonaviy, tezkor va chiroyli veb-saytlar hamda interfeyslar

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Saytim</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:400px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#667eea;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:0.3s;
        }

        .btn:hover{
            background:#4f63d8;
            transform:translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Xush Kelibsiz!</h1>
        <p>Bu HTML va CSS yordamida yaratilgan zamonaviy sahifa.</p>
        <a href="#" class="btn">Boshlash</a>
    </div>

</body>
</html>
